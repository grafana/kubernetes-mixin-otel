# Cluster workloads for exact parity with dev series counts:
# 6 deployments (replicas=1), 2 daemonsets, 2 jobs → 10 pods, 11 containers.
# Resources: 1 cpu limit, 3 cpu request, 2 memory limit, 3 memory request (match dev).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kwok-mixin-deploy-1
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kwok-mixin-deploy-1
  template:
    metadata:
      labels:
        app: kwok-mixin-deploy-1
    spec:
      containers:
        - name: main
          image: busybox:latest
          command: ["sleep", "infinity"]
          resources:
            requests: { cpu: "10m", memory: "32Mi" }
            limits: { cpu: "100m", memory: "64Mi" }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kwok-mixin-deploy-2
  namespace: default
spec:
